# SPDX-License-Identifier: MPL-2.0
name: MSBuild

on: 
  push:
    branches:
      - master
      - develop
      - release/*
      - feature/*
      - hotfix/*
  pull_request:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: Make/VS.2019/openSeaChest_LogParser/openSeaChest_LogParser

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Static-Release 

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      matrix:
        platform: [ x64, x86 ]
        language: ['cpp']

    steps:
    #- uses: actions/checkout@v3
    - uses: actions/checkout@v6.0.2
      continue-on-error: true  # rsync code 24: harmless cleanup-phase race during VM setup
      with:
        submodules: recursive
    
    #- name: Setup NuGet
    #  uses: nuget/setup-nuget@v1
      
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2.0.0

    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.config') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore NuGet packages
      	shell: pwsh
      	working-directory: ${{env.GITHUB_WORKSPACE}}
      	run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    # Initializes the CodeQL tools for scanning.
    #- name: Initialize CodeQL
    #  uses: github/codeql-action/init@v3
    #  with:
    #    languages: ${{ matrix.language }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file. 
        # Prefix the list here with "+" to use these queries and those in the config file.
        # queries: ./path/to/local/query, your-org/your-repo/queries@main

    - name: Build
      shell: pwsh
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}} /p:Platform=${{matrix.platform}}
      
    #- name: Perform CodeQL Analysis
    #  uses: github/codeql-action/analyze@v3
