# SPDX-License-Identifier: MPL-2.0
# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
name: "CodeQL"

on:
  push:
    branches: [develop, master]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [develop]
  schedule:
    - cron: '0 12 * * 6'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Path to the solution file relative to the root of the project.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Set at the workflow level

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Prevent long builds from being killed
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp']
       
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.14.1
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      continue-on-error: true  # rsync code 24: harmless cleanup-phase race during VM setup
      with:
        # We must fetch at least the immediate parents so that if this is
        # a pull request then we can checkout the head.
        fetch-depth: 2
        submodules: recursive

    # If this run was triggered by a pull request event, then checkout
    # the head of the pull request instead of the merge commit.
    #- run: git checkout HEAD^2
    #  if: ${{ github.event_name == 'pull_request' }}

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality  # Optional: run both security + quality checks


    - run: |
       cd Make/gcc
       make farm && make clean_all && make release

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      #with:
      #  category: "/language:${{ matrix.language }}"
